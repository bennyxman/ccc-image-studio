<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCC Image Studio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1117'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='%23c8956c'>C</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#08090d;--bg-panel:#0f1118;--bg-card:#151821;--bg-hover:#1a1e2a;
  --border:#1e2433;--border-active:#c8956c;
  --text-primary:#e8e4df;--text-secondary:#7a7d87;--text-muted:#4a4d57;
  --accent:#c8956c;--accent-glow:#c8956c33;--accent-bright:#e0b08a;
  --danger:#e05252;--success:#5cb86c;
  --glass:rgba(15,17,24,0.85);
  --radius:10px;--radius-lg:14px;
}
html,body{height:100%;overflow:hidden;background:var(--bg-deep);color:var(--text-primary);font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;background:var(--border);border-radius:4px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--bg-panel);cursor:pointer;box-shadow:0 0 8px var(--accent-glow)}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--bg-panel);cursor:pointer}
input[type=text],input[type=number]{background:var(--bg-deep);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text-primary);font-family:inherit;font-size:12px;outline:none;transition:border .2s}
input[type=text]:focus,input[type=number]:focus{border-color:var(--accent)}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .2s}
.app{display:flex;height:100vh;overflow:hidden}
/* Sidebar */
.sidebar{width:300px;min-width:300px;background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column;position:relative;z-index:10}
.sidebar::after{content:'';position:absolute;top:0;right:0;bottom:0;width:1px;background:linear-gradient(to bottom,var(--accent)0%,transparent 30%,transparent 70%,var(--accent)100%);opacity:.3}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#8a6040);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:18px;color:#fff;font-weight:700}
.logo-text{font-size:13px;font-weight:700;letter-spacing:2.5px;color:var(--accent)}
.logo-sub{font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-top:1px}
.file-info{font-size:10px;color:var(--text-muted);margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toolbar-row{display:flex;gap:4px;padding:4px 6px}
.history-btns{display:flex;gap:4px;margin-left:auto}
.hist-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);font-size:14px}
.hist-btn:hover{border-color:var(--accent);color:var(--accent)}
.hist-btn.disabled{opacity:.25;pointer-events:none}
/* Tabs */
.tabs{display:flex;gap:2px;padding:10px 12px 6px;flex-wrap:wrap}
.tab{flex:1 0 30%;padding:10px 4px 8px;text-align:center;font-size:10px;font-weight:600;color:var(--text-muted);background:transparent;border-radius:var(--radius);letter-spacing:.3px;position:relative;overflow:hidden}
.tab::before{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:2px;transform:scaleX(0);transition:transform .25s}
.tab:hover{color:var(--text-secondary);background:var(--bg-hover)}
.tab.active{color:var(--accent);background:rgba(200,149,108,.06)}
.tab.active::before{transform:scaleX(1)}
.tab-icon{font-size:17px;margin-bottom:3px;display:block}
/* Panel */
.panel{flex:1;overflow-y:auto;padding:16px 18px 80px}
.section-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.slider-group{margin-bottom:14px}
.slider-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.slider-label{font-size:11px;font-weight:500;color:var(--text-secondary)}
.slider-value{font-size:11px;font-weight:700;color:var(--accent);min-width:36px;text-align:right}
/* Buttons grid */
.btn-grid{display:grid;gap:6px}
.btn-grid.cols-2{grid-template-columns:1fr 1fr}
.btn-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.btn-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr}
.action-btn{padding:10px 8px;font-size:11px;font-weight:600;color:var(--text-secondary);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);text-align:center;letter-spacing:.2px}
.action-btn:hover{border-color:var(--accent);color:var(--text-primary);background:var(--bg-hover)}
.action-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(200,149,108,.08)}
.action-btn.primary{background:linear-gradient(135deg,var(--accent),#a07048);color:#fff;border-color:transparent;font-weight:700}
.action-btn.primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 16px var(--accent-glow)}
/* Color dots */
.color-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-dot:hover{transform:scale(1.15)}
.color-dot.active{border-color:var(--accent);box-shadow:0 0 10px var(--accent-glow)}
/* Filter cards */
.filter-card{padding:12px 10px;font-size:11px;font-weight:600;color:var(--text-secondary);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);text-align:center;cursor:pointer;position:relative;overflow:hidden}
.filter-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,var(--accent-glow));opacity:0;transition:opacity .2s}
.filter-card:hover{border-color:var(--accent);color:var(--text-primary)}
.filter-card:hover::after{opacity:1}
/* Bottom bar */
.sidebar-footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg-panel)}
.footer-btn{flex:1;padding:10px;font-size:11px;font-weight:600;border-radius:var(--radius);color:var(--text-secondary);background:var(--bg-card);border:1px solid var(--border)}
.footer-btn:hover{border-color:var(--accent);color:var(--text-primary)}
.footer-btn.export{flex:1.6;background:linear-gradient(135deg,var(--accent),#a07048);color:#fff;border:none;font-weight:700;letter-spacing:.5px}
.footer-btn.export:hover{filter:brightness(1.1);box-shadow:0 4px 20px var(--accent-glow)}
/* Canvas area */
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--bg-deep)}
.canvas-bg{position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,#141722 1px,transparent 0);background-size:24px 24px;opacity:.6}
.canvas-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(8,9,13,.7)100%);pointer-events:none}
.canvas-wrapper{position:relative;line-height:0;z-index:2;transition:box-shadow .3s}
.canvas-wrapper img{display:block;max-width:min(100%,calc(100vw - 380px));max-height:85vh;transition:filter .3s,transform .3s}
/* Overlays */
.crop-overlay{position:absolute;border:2px dashed var(--accent);background:rgba(200,149,108,.08);pointer-events:none;z-index:5}
.mosaic-overlay{position:absolute;border:2px dashed #e09050;background:rgba(224,144,80,.08);pointer-events:none;z-index:5}
.annot-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4}
.watermark-overlay{position:absolute;z-index:6;pointer-events:none;font-weight:700;letter-spacing:1px;text-shadow:1px 2px 6px rgba(0,0,0,.6),0 0 20px rgba(0,0,0,.3)}
/* Welcome screen */
.welcome{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-deep);position:relative;overflow:hidden}
.welcome-bg{position:absolute;inset:0}
.welcome-bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg at 50% 50%,transparent 0deg,var(--accent-glow) 60deg,transparent 120deg);animation:welcomeSpin 15s linear infinite}
.welcome-bg::after{content:'';position:absolute;inset:40px;background:var(--bg-deep);border-radius:50%}
@keyframes welcomeSpin{to{transform:rotate(360deg)}}
.welcome-card{position:relative;z-index:2;text-align:center;padding:60px;border-radius:24px;background:var(--glass);backdrop-filter:blur(40px);border:1px solid var(--border);max-width:460px;width:90%}
.welcome-logo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--accent),#8a6040);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:30px;color:#fff;margin:0 auto 20px;box-shadow:0 8px 32px var(--accent-glow)}
.welcome-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--text-primary);margin-bottom:6px}
.welcome-sub{color:var(--text-muted);font-size:13px;margin-bottom:36px;letter-spacing:.3px}
.drop-zone{padding:44px 32px;border:2px dashed var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:all .3s}
.drop-zone:hover{border-color:var(--accent);background:rgba(200,149,108,.04)}
.drop-zone-icon{font-size:28px;color:var(--accent);margin-bottom:8px}
.drop-zone-text{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:4px}
.drop-zone-hint{font-size:11px;color:var(--text-muted)}
.welcome-footer{margin-top:28px;font-size:10px;color:var(--text-muted);letter-spacing:.5px}
/* Notification toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg-card);border:1px solid var(--accent);border-radius:var(--radius);padding:12px 20px;color:var(--accent);font-size:12px;font-weight:600;z-index:999;transform:translateY(80px);opacity:0;transition:all .35s ease;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
/* Responsive */
@media(max-width:768px){
  .app{flex-direction:column}
  .sidebar{width:100%;min-width:unset;max-height:50vh;border-right:none;border-bottom:1px solid var(--border)}
  .sidebar::after{display:none}
  .canvas-wrapper img{max-width:90vw;max-height:40vh}
}
/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.panel>*{animation:fadeIn .3s ease backwards}
.panel>*:nth-child(1){animation-delay:.05s}
.panel>*:nth-child(2){animation-delay:.1s}
.panel>*:nth-child(3){animation-delay:.15s}
.panel>*:nth-child(4){animation-delay:.2s}
.panel>*:nth-child(5){animation-delay:.25s}
.panel>*:nth-child(6){animation-delay:.3s}
.panel>*:nth-child(7){animation-delay:.35s}
</style>
</head>
<body>

<div id="toast" class="toast"></div>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════
// CCC IMAGE STUDIO — Standalone Professional Editor
// ═══════════════════════════════════════════════════

const FILTERS = [
  {name:"Original",v:{}},
  {name:"Vivid",v:{saturate:140,contrast:115}},
  {name:"Warm",v:{sepia:22,saturate:120,brightness:105}},
  {name:"Cool",v:{hueRotate:18,saturate:85,brightness:105}},
  {name:"Cinema",v:{contrast:125,saturate:80,brightness:95,sepia:8}},
  {name:"B\u0026W",v:{grayscale:100}},
  {name:"Vintage",v:{sepia:40,contrast:88,brightness:92}},
  {name:"Drama",v:{contrast:145,saturate:75,brightness:92}},
  {name:"Fade",v:{contrast:82,brightness:112,saturate:78}},
  {name:"Noir",v:{grayscale:100,contrast:135,brightness:88}},
  {name:"Sharp",v:{contrast:128,saturate:115}},
  {name:"Amber",v:{sepia:30,saturate:130,brightness:102,hueRotate:5}}
];

const FRAMES = [
  {name:"Keiner",s:{}},
  {name:"Fein",s:{border:"1px solid rgba(200,149,108,.4)"}},
  {name:"Klassisch",s:{border:"6px solid #1a1a2e",boxShadow:"inset 0 0 0 1.5px #c8956c"}},
  {name:"Schatten",s:{boxShadow:"0 12px 48px rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.3)"}},
  {name:"Rund",s:{borderRadius:"50%",border:"3px solid #c8956c",boxShadow:"0 8px 32px rgba(0,0,0,.4)"}},
  {name:"Polaroid",s:{border:"14px solid #f5f0eb",borderBottom:"52px solid #f5f0eb",boxShadow:"0 6px 24px rgba(0,0,0,.25)"}},
  {name:"Gold",s:{border:"4px solid #c8956c",boxShadow:"0 0 0 1px #8a6040,0 8px 32px rgba(200,149,108,.2)"}},
  {name:"Doppelt",s:{border:"3px solid var(--text-primary)",outline:"3px solid var(--accent)",outlineOffset:"4px"}}
];

// State
let state = {
  image:null, fileName:'', tab:'adjust',
  adj:{brightness:100,contrast:100,saturate:100,grayscale:0,sepia:0,hueRotate:0,blur:0,invert:0},
  rotation:0, flipH:false, flipV:false, frame:0,
  annotations:[], annotMode:null, annotColor:'#e05252', annotSize:3,
  drawing:false, currentPath:[], textInput:'',
  cropMode:false, cropStart:null, cropEnd:null, isCropping:false,
  mosaicMode:false, mosaicStart:null, mosaicEnd:null, isMosaicing:false,
  watermark:'', wmPos:'br', wmOpacity:40,
  history:[], histIdx:-1
};

const defAdj = {...state.adj};
let imgEl = null, wrapperEl = null;

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

function buildFilter(a){
  let p=[];
  if(a.brightness!==100)p.push(`brightness(${a.brightness}%)`);
  if(a.contrast!==100)p.push(`contrast(${a.contrast}%)`);
  if(a.saturate!==100)p.push(`saturate(${a.saturate}%)`);
  if(a.grayscale)p.push(`grayscale(${a.grayscale}%)`);
  if(a.sepia)p.push(`sepia(${a.sepia}%)`);
  if(a.hueRotate)p.push(`hue-rotate(${a.hueRotate}deg)`);
  if(a.blur)p.push(`blur(${a.blur}px)`);
  if(a.invert)p.push(`invert(${a.invert}%)`);
  return p.join(' ')||'none';
}

function pushHistory(){
  const snap = JSON.parse(JSON.stringify({adj:state.adj,rotation:state.rotation,flipH:state.flipH,flipV:state.flipV,frame:state.frame,annotations:state.annotations,watermark:state.watermark,wmPos:state.wmPos,wmOpacity:state.wmOpacity}));
  state.history = state.history.slice(0,state.histIdx+1);
  state.history.push(snap);
  state.histIdx = state.history.length-1;
}

function restoreSnap(snap){
  state.adj={...snap.adj}; state.rotation=snap.rotation; state.flipH=snap.flipH; state.flipV=snap.flipV;
  state.frame=snap.frame; state.annotations=[...snap.annotations]; state.watermark=snap.watermark;
  state.wmPos=snap.wmPos; state.wmOpacity=snap.wmOpacity;
}

function undo(){ if(state.histIdx>0){ state.histIdx--; restoreSnap(state.history[state.histIdx]); render(); }}
function redo(){ if(state.histIdx<state.history.length-1){ state.histIdx++; restoreSnap(state.history[state.histIdx]); render(); }}

function loadFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  state.fileName=file.name;
  const r=new FileReader();
  r.onload=e=>{
    state.image=e.target.result;
    state.adj={...defAdj}; state.rotation=0; state.flipH=false; state.flipV=false;
    state.frame=0; state.annotations=[]; state.watermark=''; state.history=[]; state.histIdx=-1;
    state.tab='adjust';
    pushHistory();
    render();
  };
  r.readAsDataURL(file);
}

function setTab(t){
  state.tab=t;
  state.cropMode=(t==='crop');
  state.mosaicMode=(t==='mosaic');
  state.annotMode=(t==='annotate'?'draw':null);
  state.cropStart=state.cropEnd=null;
  state.mosaicStart=state.mosaicEnd=null;
  render();
}

function setAdj(key,val){ pushHistory(); state.adj[key]=val; render(); }
function applyFilter(f){ pushHistory(); state.adj={...defAdj,...f.v}; render(); }

function exportImage(){
  if(!imgEl)return;
  const c=document.createElement('canvas');
  const rot=state.rotation%180!==0;
  const cw=rot?imgEl.naturalHeight:imgEl.naturalWidth;
  const ch=rot?imgEl.naturalWidth:imgEl.naturalHeight;
  c.width=cw; c.height=ch;
  const ctx=c.getContext('2d');
  ctx.save();
  ctx.translate(cw/2,ch/2);
  ctx.rotate(state.rotation*Math.PI/180);
  ctx.scale(state.flipH?-1:1,state.flipV?-1:1);
  ctx.filter=buildFilter(state.adj);
  ctx.drawImage(imgEl,-imgEl.naturalWidth/2,-imgEl.naturalHeight/2);
  ctx.restore();
  // Annotations
  const scl=imgEl.naturalWidth/(wrapperEl?.offsetWidth||imgEl.naturalWidth);
  state.annotations.forEach(a=>{
    if(a.type==='path'){
      ctx.beginPath(); ctx.strokeStyle=a.color; ctx.lineWidth=a.size*scl; ctx.lineCap='round'; ctx.lineJoin='round';
      a.points.forEach((p,i)=>{if(i===0)ctx.moveTo(p.x*scl,p.y*scl);else ctx.lineTo(p.x*scl,p.y*scl);});
      ctx.stroke();
    } else if(a.type==='text'){
      ctx.font=`bold ${a.size*6*scl}px 'DM Sans',sans-serif`; ctx.fillStyle=a.color;
      ctx.fillText(a.text,a.x*scl,a.y*scl);
    }
  });
  // Watermark
  if(state.watermark){
    ctx.save(); ctx.globalAlpha=state.wmOpacity/100;
    const fs=Math.max(18,cw*.03);
    ctx.font=`bold ${fs}px 'DM Sans',sans-serif`;
    ctx.fillStyle='#fff'; ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=2;
    const m=ctx.measureText(state.watermark); const pad=fs;
    let wx,wy;
    if(state.wmPos==='tl'){wx=pad;wy=pad+fs}else if(state.wmPos==='tr'){wx=cw-m.width-pad;wy=pad+fs}
    else if(state.wmPos==='bl'){wx=pad;wy=ch-pad}else{wx=cw-m.width-pad;wy=ch-pad}
    ctx.strokeText(state.watermark,wx,wy); ctx.fillText(state.watermark,wx,wy);
    ctx.restore();
  }
  const link=document.createElement('a');
  link.download=`CCC_${state.fileName||'image'}.png`;
  link.href=c.toDataURL('image/png',1);
  link.click();
  toast('Bild exportiert!');
}

function applyCrop(){
  if(!state.cropStart||!state.cropEnd||!imgEl||!wrapperEl)return;
  const rect=wrapperEl.getBoundingClientRect();
  const sx=imgEl.naturalWidth/rect.width, sy=imgEl.naturalHeight/rect.height;
  const x1=Math.min(state.cropStart.x,state.cropEnd.x)*sx;
  const y1=Math.min(state.cropStart.y,state.cropEnd.y)*sy;
  const cw=Math.abs(state.cropEnd.x-state.cropStart.x)*sx;
  const ch=Math.abs(state.cropEnd.y-state.cropStart.y)*sy;
  if(cw<10||ch<10)return;
  const c=document.createElement('canvas'); c.width=cw; c.height=ch;
  c.getContext('2d').drawImage(imgEl,x1,y1,cw,ch,0,0,cw,ch);
  state.image=c.toDataURL('image/png');
  state.cropStart=state.cropEnd=null; state.cropMode=false;
  pushHistory(); toast('Zugeschnitten!'); render();
}

function applyMosaic(){
  if(!state.mosaicStart||!state.mosaicEnd||!imgEl||!wrapperEl)return;
  const rect=wrapperEl.getBoundingClientRect();
  const sx=imgEl.naturalWidth/rect.width, sy=imgEl.naturalHeight/rect.height;
  const x1=Math.round(Math.min(state.mosaicStart.x,state.mosaicEnd.x)*sx);
  const y1=Math.round(Math.min(state.mosaicStart.y,state.mosaicEnd.y)*sy);
  const mw=Math.round(Math.abs(state.mosaicEnd.x-state.mosaicStart.x)*sx);
  const mh=Math.round(Math.abs(state.mosaicEnd.y-state.mosaicStart.y)*sy);
  if(mw<5||mh<5)return;
  const c=document.createElement('canvas'); c.width=imgEl.naturalWidth; c.height=imgEl.naturalHeight;
  const ctx=c.getContext('2d'); ctx.drawImage(imgEl,0,0);
  const ps=14; const d=ctx.getImageData(x1,y1,mw,mh);
  for(let y=0;y<mh;y+=ps)for(let x=0;x<mw;x+=ps){
    const i=(y*mw+x)*4;
    ctx.fillStyle=`rgb(${d.data[i]},${d.data[i+1]},${d.data[i+2]})`;
    ctx.fillRect(x1+x,y1+y,ps,ps);
  }
  state.image=c.toDataURL('image/png');
  state.mosaicStart=state.mosaicEnd=null; state.mosaicMode=false;
  pushHistory(); toast('Mosaik angewendet!'); render();
}

function getRelPos(e,el){
  const r=el.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return {x:cx-r.left,y:cy-r.top};
}

function resetAll(){ pushHistory(); state.adj={...defAdj}; state.rotation=0; state.flipH=false; state.flipV=false; state.frame=0; state.annotations=[]; state.watermark=''; toast('Zurückgesetzt!'); render(); }

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render(){
  const app = document.getElementById('app');

  if(!state.image){
    app.innerHTML = `
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-bg"></div>
      <div class="welcome-card">
        <div class="welcome-logo">C</div>
        <div class="welcome-title">Image Studio</div>
        <div class="welcome-sub">Professionelle Bildbearbeitung — by BridgepointAfreuropa</div>
        <div class="drop-zone" id="dropZone">
          <div class="drop-zone-icon">⬆</div>
          <div class="drop-zone-text">Bild auswählen</div>
          <div class="drop-zone-hint">Drag & Drop oder klicken • JPG, PNG, WebP, GIF</div>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <div class="welcome-footer">VERSION 1.0 — STANDALONE DESKTOP APP</div>
      </div>
    </div>`;
    document.getElementById('dropZone').onclick=()=>document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange=e=>loadFile(e.target.files[0]);
    const ws=document.getElementById('welcomeScreen');
    ws.ondragover=e=>{e.preventDefault();document.querySelector('.drop-zone').style.borderColor='var(--accent)'};
    ws.ondragleave=()=>{document.querySelector('.drop-zone').style.borderColor='var(--border)'};
    ws.ondrop=e=>{e.preventDefault();loadFile(e.dataTransfer.files[0])};
    return;
  }

  const tabs = [
    {id:'adjust',icon:'◐',label:'Korrektur'},
    {id:'filter',icon:'◈',label:'Filter'},
    {id:'crop',icon:'⬔',label:'Zuschneiden'},
    {id:'annotate',icon:'✎',label:'Annotieren'},
    {id:'mosaic',icon:'▦',label:'Mosaik'},
    {id:'frame',icon:'❑',label:'Rahmen'},
    {id:'watermark',icon:'◎',label:'Wasserz.'}
  ];

  const frameStyle = FRAMES[state.frame]?.s||{};
  const fsCss = Object.entries(frameStyle).map(([k,v])=>`${k.replace(/([A-Z])/g,'-$1').toLowerCase()}:${v}`).join(';');
  const filterCss = buildFilter(state.adj);
  const transformCss = `rotate(${state.rotation}deg) scaleX(${state.flipH?-1:1}) scaleY(${state.flipV?-1:1})`;

  let panelHTML = '';
  if(state.tab==='adjust'){
    const sliders=[
      ['Helligkeit','brightness',20,200,'%'],['Kontrast','contrast',20,200,'%'],['Sättigung','saturate',0,200,'%'],
      ['Graustufen','grayscale',0,100,'%'],['Sepia','sepia',0,100,'%'],['Farbton','hueRotate',0,360,'°'],
      ['Weichzeichner','blur',0,20,'px']
    ];
    panelHTML=`<div class="section-label">Anpassungen</div>`+sliders.map(([l,k,mn,mx,u])=>`
      <div class="slider-group"><div class="slider-head"><span class="slider-label">${l}</span><span class="slider-value">${state.adj[k]}${u}</span></div>
      <input type="range" min="${mn}" max="${mx}" value="${state.adj[k]}" data-key="${k}" class="adj-slider" step="${k==='blur'?0.5:1}"></div>`).join('');
  } else if(state.tab==='filter'){
    panelHTML=`<div class="section-label">Voreinstellungen</div><div class="btn-grid cols-3">`+FILTERS.map((f,i)=>`<div class="filter-card" data-fi="${i}">${f.name}</div>`).join('')+`</div>`;
  } else if(state.tab==='crop'){
    panelHTML=`<div class="section-label">Transformieren</div>
      <div class="slider-group"><div class="slider-head"><span class="slider-label">Drehung</span><span class="slider-value">${state.rotation}°</span></div>
      <input type="range" min="0" max="360" value="${state.rotation}" id="rotSlider"></div>
      <div class="btn-grid cols-2" style="margin-bottom:12px">
        <button class="action-btn" id="rot90">↻ 90°</button>
        <button class="action-btn ${state.flipH?'active':''}" id="flipH">↔ Horiz.</button>
        <button class="action-btn ${state.flipV?'active':''}" id="flipV">↕ Vertikal</button>
        ${state.cropStart&&state.cropEnd?`<button class="action-btn primary" id="applyCrop">✓ Zuschneiden</button>`:'<div></div>'}
      </div>
      <p style="font-size:11px;color:var(--text-muted);line-height:1.5">Ziehe einen Bereich auf dem Bild um zuzuschneiden.</p>`;
  } else if(state.tab==='annotate'){
    panelHTML=`<div class="section-label">Werkzeug</div>
      <div class="btn-grid cols-2" style="margin-bottom:14px">
        <button class="action-btn ${state.annotMode==='draw'?'active':''}" id="modeDraw">✏ Zeichnen</button>
        <button class="action-btn ${state.annotMode==='text'?'active':''}" id="modeText">T Text</button>
      </div>
      ${state.annotMode==='text'?`<input type="text" id="textIn" value="${state.textInput}" placeholder="Text eingeben, dann klicken..." style="width:100%;margin-bottom:12px">`:''}
      <div class="section-label">Farbe</div>
      <div class="color-row">${['#e05252','#e09050','#e0c840','#50b868','#4a9eff','#a060d0','#ffffff','#000000'].map(c=>`<div class="color-dot ${state.annotColor===c?'active':''}" style="background:${c}" data-color="${c}"></div>`).join('')}</div>
      <div class="slider-group"><div class="slider-head"><span class="slider-label">Stärke</span><span class="slider-value">${state.annotSize}</span></div>
      <input type="range" min="1" max="14" value="${state.annotSize}" id="annotSizeSlider"></div>
      ${state.annotations.length?`<button class="action-btn" id="clearAnnot" style="width:100%">🗑 Alle Annotationen löschen</button>`:''}`;
  } else if(state.tab==='mosaic'){
    panelHTML=`<div class="section-label">Verpixelung</div>
      <p style="font-size:11px;color:var(--text-muted);line-height:1.6;margin-bottom:14px">Ziehe einen Bereich auf dem Bild um ihn zu verpixeln. Ideal für Gesichter, Nummernschilder oder sensible Daten.</p>
      ${state.mosaicStart&&state.mosaicEnd?`<button class="action-btn primary" id="applyMosaic" style="width:100%">✓ Mosaik anwenden</button>`:''}`;
  } else if(state.tab==='frame'){
    panelHTML=`<div class="section-label">Rahmenauswahl</div><div class="btn-grid cols-2">`+FRAMES.map((f,i)=>`<button class="action-btn ${state.frame===i?'active':''}" data-frame="${i}">${f.name}</button>`).join('')+`</div>`;
  } else if(state.tab==='watermark'){
    panelHTML=`<div class="section-label">Wasserzeichen</div>
      <input type="text" id="wmText" value="${state.watermark}" placeholder="z.B. © CCC 2026" style="width:100%;margin-bottom:14px">
      <div class="section-label">Position</div>
      <div class="btn-grid cols-2" style="margin-bottom:14px">
        ${[['tl','↖ Oben Links'],['tr','↗ Oben Rechts'],['bl','↙ Unten Links'],['br','↘ Unten Rechts']].map(([p,l])=>`<button class="action-btn ${state.wmPos===p?'active':''}" data-wmp="${p}">${l}</button>`).join('')}
      </div>
      <div class="slider-group"><div class="slider-head"><span class="slider-label">Deckkraft</span><span class="slider-value">${state.wmOpacity}%</span></div>
      <input type="range" min="10" max="100" value="${state.wmOpacity}" id="wmOpSlider"></div>`;
  }

  // Watermark position CSS
  let wmStyle = '';
  if(state.watermark){
    const vp = state.wmPos;
    wmStyle = `${vp[0]==='t'?'top:16px':'bottom:16px'};${vp[1]==='l'?'left:16px':'right:16px'};opacity:${state.wmOpacity/100};font-size:clamp(11px,2.2vw,22px)`;
  }

  // Annotation SVG
  let annotSVG = '';
  state.annotations.forEach(a=>{
    if(a.type==='path'){
      const d=a.points.map((p,i)=>`${i===0?'M':'L'}${p.x} ${p.y}`).join(' ');
      annotSVG+=`<path d="${d}" stroke="${a.color}" stroke-width="${a.size}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
    } else if(a.type==='text'){
      annotSVG+=`<text x="${a.x}" y="${a.y}" fill="${a.color}" font-size="${a.size*6}" font-family="DM Sans,sans-serif" font-weight="600">${a.text}</text>`;
    }
  });
  if(state.drawing&&state.currentPath.length>0){
    const d=state.currentPath.map((p,i)=>`${i===0?'M':'L'}${p.x} ${p.y}`).join(' ');
    annotSVG+=`<path d="${d}" stroke="${state.annotColor}" stroke-width="${state.annotSize}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
  }

  const cursor = (state.cropMode||state.mosaicMode||state.annotMode)?'crosshair':'default';

  app.innerHTML=`
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-mark">C</div>
          <div><div class="logo-text">IMAGE STUDIO</div><div class="logo-sub">by CCC</div></div>
          <div class="history-btns">
            <button class="hist-btn ${state.histIdx<=0?'disabled':''}" id="undoBtn" title="Rückgängig">↶</button>
            <button class="hist-btn ${state.histIdx>=state.history.length-1?'disabled':''}" id="redoBtn" title="Wiederholen">↷</button>
          </div>
        </div>
        <div class="file-info">${state.fileName} — ${state.annotations.length} Annotationen</div>
      </div>
      <div class="tabs">${tabs.map(t=>`<div class="tab ${state.tab===t.id?'active':''}" data-tab="${t.id}"><span class="tab-icon">${t.icon}</span>${t.label}</div>`).join('')}</div>
      <div class="panel" id="panel">${panelHTML}</div>
      <div class="sidebar-footer">
        <button class="footer-btn" id="resetBtn">↺ Reset</button>
        <button class="footer-btn" id="newBtn">+ Neu</button>
        <button class="footer-btn export" id="exportBtn">⬇ Exportieren</button>
      </div>
    </div>
    <div class="canvas-area">
      <div class="canvas-bg"></div>
      <div class="canvas-vignette"></div>
      <div class="canvas-wrapper" id="canvasWrapper" style="${fsCss};cursor:${cursor}">
        <img id="mainImg" src="${state.image}" crossorigin="anonymous" style="filter:${filterCss};transform:${transformCss}" alt="Bild">
        ${annotSVG?`<svg class="annot-svg">${annotSVG}</svg>`:''}
        ${state.watermark?`<div class="watermark-overlay" style="${wmStyle}">${state.watermark}</div>`:''}
      </div>
    </div>
  </div>`;

  // Refs
  imgEl = document.getElementById('mainImg');
  wrapperEl = document.getElementById('canvasWrapper');

  // Event bindings
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>setTab(el.dataset.tab));
  document.getElementById('undoBtn').onclick=undo;
  document.getElementById('redoBtn').onclick=redo;
  document.getElementById('resetBtn').onclick=resetAll;
  document.getElementById('newBtn').onclick=()=>{state.image=null;state.fileName='';render()};
  document.getElementById('exportBtn').onclick=exportImage;

  // Tab-specific bindings
  document.querySelectorAll('.adj-slider').forEach(el=>{el.oninput=()=>setAdj(el.dataset.key,parseFloat(el.value))});
  document.querySelectorAll('[data-fi]').forEach(el=>{el.onclick=()=>applyFilter(FILTERS[el.dataset.fi])});
  document.querySelectorAll('[data-frame]').forEach(el=>{el.onclick=()=>{pushHistory();state.frame=parseInt(el.dataset.frame);render()}});
  document.querySelectorAll('[data-color]').forEach(el=>{el.onclick=()=>{state.annotColor=el.dataset.color;render()}});
  document.querySelectorAll('[data-wmp]').forEach(el=>{el.onclick=()=>{pushHistory();state.wmPos=el.dataset.wmp;render()}});

  const rotS=document.getElementById('rotSlider');
  if(rotS)rotS.oninput=()=>{pushHistory();state.rotation=parseInt(rotS.value);render()};
  const r90=document.getElementById('rot90');
  if(r90)r90.onclick=()=>{pushHistory();state.rotation=(state.rotation+90)%360;render()};
  const fh=document.getElementById('flipH');
  if(fh)fh.onclick=()=>{pushHistory();state.flipH=!state.flipH;render()};
  const fv=document.getElementById('flipV');
  if(fv)fv.onclick=()=>{pushHistory();state.flipV=!state.flipV;render()};
  const ac=document.getElementById('applyCrop');
  if(ac)ac.onclick=applyCrop;
  const am=document.getElementById('applyMosaic');
  if(am)am.onclick=applyMosaic;
  const md=document.getElementById('modeDraw');
  if(md)md.onclick=()=>{state.annotMode='draw';render()};
  const mt=document.getElementById('modeText');
  if(mt)mt.onclick=()=>{state.annotMode='text';render()};
  const ti=document.getElementById('textIn');
  if(ti){ti.oninput=()=>{state.textInput=ti.value};ti.focus();}
  const as=document.getElementById('annotSizeSlider');
  if(as)as.oninput=()=>{state.annotSize=parseInt(as.value);render()};
  const ca=document.getElementById('clearAnnot');
  if(ca)ca.onclick=()=>{pushHistory();state.annotations=[];render()};
  const wt=document.getElementById('wmText');
  if(wt)wt.oninput=()=>{state.watermark=wt.value;render()};
  const wo=document.getElementById('wmOpSlider');
  if(wo)wo.oninput=()=>{pushHistory();state.wmOpacity=parseInt(wo.value);render()};

  // Canvas mouse events
  if(wrapperEl){
    const down=e=>{
      e.preventDefault();
      const pos=getRelPos(e,wrapperEl);
      if(state.cropMode){state.cropStart=pos;state.cropEnd=null;state.isCropping=true;}
      else if(state.mosaicMode){state.mosaicStart=pos;state.mosaicEnd=null;state.isMosaicing=true;}
      else if(state.annotMode==='draw'){state.drawing=true;state.currentPath=[pos];}
      else if(state.annotMode==='text'&&state.textInput.trim()){
        pushHistory();
        state.annotations.push({type:'text',x:pos.x,y:pos.y,text:state.textInput,color:state.annotColor,size:state.annotSize});
        state.textInput='';render();
      }
    };
    const move=e=>{
      if(!state.isCropping&&!state.isMosaicing&&!state.drawing)return;
      e.preventDefault();
      const pos=getRelPos(e.touches?e.touches[0]:e,wrapperEl);
      if(state.isCropping){
        state.cropEnd=pos;
        let ov=wrapperEl.querySelector('.crop-overlay');
        if(!ov){ov=document.createElement('div');ov.className='crop-overlay';wrapperEl.appendChild(ov);}
        const l=Math.min(state.cropStart.x,pos.x),t=Math.min(state.cropStart.y,pos.y);
        const w=Math.abs(pos.x-state.cropStart.x),h=Math.abs(pos.y-state.cropStart.y);
        ov.style.cssText=`left:${l}px;top:${t}px;width:${w}px;height:${h}px;position:absolute;border:2px dashed var(--accent);background:rgba(200,149,108,.08);pointer-events:none;z-index:5`;
      } else if(state.isMosaicing){
        state.mosaicEnd=pos;
        let ov=wrapperEl.querySelector('.mosaic-overlay');
        if(!ov){ov=document.createElement('div');ov.className='mosaic-overlay';wrapperEl.appendChild(ov);}
        const l=Math.min(state.mosaicStart.x,pos.x),t=Math.min(state.mosaicStart.y,pos.y);
        const w=Math.abs(pos.x-state.mosaicStart.x),h=Math.abs(pos.y-state.mosaicStart.y);
        ov.style.cssText=`left:${l}px;top:${t}px;width:${w}px;height:${h}px;position:absolute;border:2px dashed #e09050;background:rgba(224,144,80,.08);pointer-events:none;z-index:5`;
      } else if(state.drawing){
        state.currentPath.push(pos);
        const svg=wrapperEl.querySelector('.annot-svg')||document.createElementNS('http://www.w3.org/2000/svg','svg');
        if(!svg.parentNode){svg.setAttribute('class','annot-svg');svg.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4';wrapperEl.appendChild(svg);}
        let lp=svg.querySelector('.live-path');
        if(!lp){lp=document.createElementNS('http://www.w3.org/2000/svg','path');lp.setAttribute('class','live-path');lp.setAttribute('fill','none');lp.setAttribute('stroke-linecap','round');lp.setAttribute('stroke-linejoin','round');svg.appendChild(lp);}
        lp.setAttribute('stroke',state.annotColor);
        lp.setAttribute('stroke-width',state.annotSize);
        lp.setAttribute('d',state.currentPath.map((p,i)=>`${i===0?'M':'L'}${p.x} ${p.y}`).join(' '));
      }
    };
    const up=()=>{
      if(state.isCropping){state.isCropping=false;if(state.cropStart&&state.cropEnd)render();}
      else if(state.isMosaicing){state.isMosaicing=false;if(state.mosaicStart&&state.mosaicEnd)render();}
      else if(state.drawing&&state.currentPath.length>1){
        pushHistory();
        state.annotations.push({type:'path',points:[...state.currentPath],color:state.annotColor,size:state.annotSize});
        state.drawing=false;state.currentPath=[];render();
      } else {state.drawing=false;state.currentPath=[];}
    };
    wrapperEl.onmousedown=down; wrapperEl.ontouchstart=down;
    document.onmousemove=move; document.ontouchmove=move;
    document.onmouseup=up; document.ontouchend=up;
  }

  // Keyboard shortcuts
  document.onkeydown=e=>{
    if(e.target.tagName==='INPUT')return;
    if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
    if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo();}
    if(e.ctrlKey&&e.key==='s'){e.preventDefault();exportImage();}
    if(e.ctrlKey&&e.key==='e'){e.preventDefault();exportImage();}
  };
}

// Drag & Drop on body
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)loadFile(f);});

// Paste from clipboard
document.addEventListener('paste',e=>{
  const items=e.clipboardData?.items;
  if(!items)return;
  for(let i=0;i<items.length;i++){
    if(items[i].type.startsWith('image/')){
      loadFile(items[i].getAsFile());
      break;
    }
  }
});

// Init
render();
</script>
</body>
</html>
